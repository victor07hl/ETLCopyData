name: CI/CD Pipeline

on:
    pull_request:
        branches:
            - master

jobs:
    test:
        name: Run Tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.12'

            - name: Install Dependencies
              run: pip install -r requirements.txt

            - name: Run Tests
              env:
                PYTHONPATH: ${{ github.workspace }}
              run: pytest testing/ -v
